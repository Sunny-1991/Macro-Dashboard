<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宏观对比汇总</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Manrope:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="gdp-style.css?v=20260305-economist-v58" />
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script defer src="gdp-local-data.js?v=20260304-macro-v24"></script>
    <script defer src="gdp-script.js?v=20260305-macro-v65"></script>
  </head>
  <body>
    <main class="layout">
      <section class="panel header-panel">
        <p class="kicker">Macro Comparison Hub</p>
        <h1>宏观对比汇总（1960-2025）</h1>
      </section>

      <section class="panel content-panel">
        <aside class="control-panel controls">
          <h2 class="settings-title">设置</h2>

          <section class="control-section control-section-flat control-block">
            <div class="control-section-head block-head block-head-stack">
              <h3>指标类型</h3>
              <p class="section-note">按经济、人口、外贸、财政分类切换</p>
            </div>
            <div class="metric-module-grid asset-list" role="radiogroup" aria-label="宏观指标切换">
              <section class="metric-module asset-group" aria-label="经济指标">
                <h3>经济</h3>
                <div class="metric-switch">
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="nominal" />
                    <span>人均GDP（汇率，美元）</span>
                  </label>
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="ppp" />
                    <span>人均GDP（PPP 美元）</span>
                  </label>
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="totalNominal" />
                    <span>GDP总量（汇率，美元）</span>
                  </label>
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="totalPpp" />
                    <span>GDP总量（PPP，美元）</span>
                  </label>
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="disposableIncome" checked />
                    <span>人均可支配收入（美元）</span>
                  </label>
                </div>
              </section>

              <section class="metric-module asset-group" aria-label="人口指标">
                <h3>人口</h3>
                <div class="metric-switch">
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="populationTotal" />
                    <span>人口总量（人）</span>
                  </label>
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="populationIncrement" />
                    <span>人口增量（人）</span>
                  </label>
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="populationGrowthRate" />
                    <span>人口增速（%）</span>
                  </label>
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="agingRate" />
                    <span>老龄化率（65+占比）</span>
                  </label>
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="fertilityRate" />
                    <span>生育率（每名女性）</span>
                  </label>
                </div>
              </section>

              <section class="metric-module asset-group" aria-label="外贸指标">
                <h3>外贸</h3>
                <div class="metric-switch">
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="imports" />
                    <span>进口额（美元）</span>
                  </label>
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="exports" />
                    <span>出口额（美元）</span>
                  </label>
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="tradeTotal" />
                    <span>进出口总额（美元）</span>
                  </label>
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="tradeBalance" />
                    <span>贸易差额（顺差为正）</span>
                  </label>
                </div>
              </section>

              <section class="metric-module asset-group" aria-label="财政指标">
                <h3>财政</h3>
                <div class="metric-switch">
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="fiscalRevenue" />
                    <span>财政收入（美元）</span>
                  </label>
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="fiscalExpenditure" />
                    <span>财政开支（美元）</span>
                  </label>
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="fiscalDeficit" />
                    <span>财政赤字（赤字为正）</span>
                  </label>
                  <label class="metric-item">
                    <input type="radio" name="gdpMetric" value="militaryExpenditure" />
                    <span>军费（美元）</span>
                  </label>
                </div>
              </section>
            </div>
          </section>

          <section class="control-section control-block">
            <div class="control-section-head block-head block-head-stack">
              <h3>图表形式</h3>
              <p id="gdpChartModeHint" class="hint">柱状图仅在单一国家显示时可用。</p>
            </div>
            <div class="metric-switch" role="radiogroup" aria-label="图表形式切换">
              <label class="metric-item">
                <input type="radio" name="gdpChartMode" value="line" checked />
                <span>折线图</span>
              </label>
              <label class="metric-item">
                <input type="radio" name="gdpChartMode" value="bar" />
                <span>柱状图（单一国家）</span>
              </label>
            </div>
          </section>

          <section class="control-section control-block">
            <div class="control-section-head block-head section-head-row">
              <div>
                <h3>国家显隐</h3>
                <p class="hint">提示：鼠标移动到年份节点可查看当年各国数据。</p>
              </div>
              <div class="control-actions control-actions-inline inline-actions">
                <button id="gdpShowAllBtn" type="button">全选</button>
                <button id="gdpHideAllBtn" type="button">清空</button>
              </div>
            </div>
            <div id="gdpCountryToggles" class="toggle-list asset-grid" aria-label="国家显示开关"></div>
          </section>
        </aside>

        <div class="chart-panel">
          <div class="chart-wrap">
            <div id="gdpMetricTitle" class="chart-overlay-title">人均可支配收入（美元）</div>
            <canvas id="gdpChart" aria-label="1960-2025 宏观多指标对比图"></canvas>
          </div>
          <div class="range-control" aria-label="时间区间控制">
            <div id="gdpRangeHint" class="range-display">1960 - 2025</div>
            <div class="range-slider-wrap">
              <div id="gdpRangeSlider" aria-label="年份区间滑块"></div>
            </div>
          </div>
          <div class="chart-tools">
            <button id="gdpDownloadBtn" type="button" disabled>下载数据图</button>
            <button id="gdpResetRangeBtn" type="button">重置全区间</button>
            <a
              href="https://api.db.nomics.world/v22/datasets/IMF/WEO:latest"
              target="_blank"
              rel="noopener noreferrer"
              >DBnomics 源数据</a
            >
            <a
              href="https://api.worldbank.org/v2/"
              target="_blank"
              rel="noopener noreferrer"
              >World Bank API</a
            >
          </div>
          <p id="gdpStatusText" class="status-text">本地数据已内置，正在渲染图表...</p>
        </div>
      </section>
    </main>
  </body>
</html>
